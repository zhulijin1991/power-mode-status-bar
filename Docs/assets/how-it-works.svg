<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">How Power Mode Status Bar works</title>
  <desc id="desc">Power Mode Status Bar uses AppKit menu bar UI, IOPM assertions, power and lid state polling, and optional pmset commands for system-level settings.</desc>
  <rect width="1280" height="540" rx="34" fill="#0b1115"/>
  <text x="56" y="70" fill="#f4fbfb" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="38" font-weight="800">How it works</text>
  <text x="56" y="110" fill="#94a7ab" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">Normal mode switching is password-free: the app changes runtime assertions, not global power settings.</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">
    <g transform="translate(70 178)">
      <rect width="240" height="150" rx="26" fill="#122126" stroke="#6fe8ff" stroke-opacity="0.40"/>
      <text x="28" y="52" fill="#eaffff" font-weight="800" font-size="24">Menu Bar</text>
      <text x="28" y="91" fill="#a5bdc1">Pick Extreme, Office</text>
      <text x="28" y="119" fill="#a5bdc1">or Standby mode</text>
    </g>
    <path d="M330 253h94" stroke="#8ff6ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M416 235l28 18l-28 18" fill="none" stroke="#8ff6ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(462 178)">
      <rect width="250" height="150" rx="26" fill="#111f1c" stroke="#8dffc1" stroke-opacity="0.40"/>
      <text x="28" y="52" fill="#effff6" font-weight="800" font-size="24">Runtime policy</text>
      <text x="28" y="91" fill="#a8c0b4">Evaluate power source</text>
      <text x="28" y="119" fill="#a8c0b4">and lid state</text>
    </g>
    <path d="M732 253h94" stroke="#9dffc8" stroke-width="8" stroke-linecap="round"/>
    <path d="M818 235l28 18l-28 18" fill="none" stroke="#9dffc8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(864 178)">
      <rect width="320" height="150" rx="26" fill="#171b29" stroke="#d4d7ff" stroke-opacity="0.40"/>
      <text x="28" y="52" fill="#f4f6ff" font-weight="800" font-size="24">IOPM assertions</text>
      <text x="28" y="91" fill="#b7bad0">Prevent idle system sleep</text>
      <text x="28" y="119" fill="#b7bad0">and display sleep as needed</text>
    </g>

    <g transform="translate(244 386)">
      <rect width="792" height="78" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="28" y="49" fill="#dbe8ea" font-size="21">Optional: click "Apply system-level settings" to run pmset with administrator authorization.</text>
    </g>
  </g>
</svg>
